<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoxelMMO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      pointer-events: none;
      text-shadow: 1px 1px 2px #000;
    }
    #hotbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: none;
      user-select: none;
      align-items: center;
    }
    .hotbar-back-btn {
      width: 50px;
      height: 50px;
      background: rgba(255, 100, 100, 0.6);
      border: 2px solid rgba(255, 150, 150, 0.8);
      border-radius: 4px;
      display: none; /* Hidden by default, shown via JS in voxel mode */
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.1s ease;
    }
    .hotbar-back-btn:active {
      background: rgba(255, 100, 100, 0.8);
      transform: scale(0.95);
    }
    /* Show back button in touch mode when visible */
    body.touch-mode .hotbar-back-btn {
      display: flex;
    }
    .hotbar-slot {
      width: 50px;
      height: 50px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.1s ease;
    }
    .hotbar-slot.selected {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }
    .hotbar-key {
      position: absolute;
      top: 2px;
      left: 4px;
      font-family: monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.6);
    }
    .hotbar-icon {
      font-size: 24px;
      line-height: 1;
    }

    /* ── Touch controls ─────────────────────────────────────────────────── */
    body.touch-mode canvas {
      touch-action: none;
    }
    body.touch-mode #hotbar {
      pointer-events: auto;
    }

    .joystick-base {
      position: fixed;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.25);
      pointer-events: auto;
      touch-action: none;
      z-index: 10;
    }
    .joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48px;
      height: 48px;
      margin-left: -24px;
      margin-top: -24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      pointer-events: none;
      touch-action: none;
    }
    .joystick-look {
      bottom: 40px;
      left: 40px;
    }
    .joystick-move {
      bottom: 40px;
      right: 40px;
    }

    .touch-btn {
      position: fixed;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.35);
      color: rgba(255, 255, 255, 0.9);
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      z-index: 10;
    }
    .touch-btn:active {
      background: rgba(255, 255, 255, 0.35);
    }

    .jump-btn {
      bottom: 180px;
      left: 72px;
    }
    .descend-btn {
      bottom: 180px;
      left: 140px;
    }
    .action-btn {
      bottom: 180px;
      right: 72px;
      width: 72px;
      height: 72px;
      font-size: 28px;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
